name: Research 36 supplemental 7 Brew opening sources

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/research-36-openings.yml

permissions:
  contents: write

concurrency:
  group: 7brew-36-source-research-main
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
        with:
          ref: run-yext-extractor
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install research dependencies
        run: python -m pip install --upgrade requests beautifulsoup4 lxml
      - name: Search, fetch, and preserve opening evidence
        run: python scripts/research_36_openings.py
      - name: Upload supplemental opening research
        uses: actions/upload-artifact@v4
        with:
          name: 7brew-36-opening-source-research-${{ github.run_id }}
          path: research_outputs/
          if-no-files-found: error
          retention-days: 30
      - name: Commit research outputs to temporary branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research_outputs/
          if git diff --cached --quiet; then
            echo "No research output changes"
          else
            git commit -m "Add supplemental opening-source research results"
            git push origin HEAD:run-yext-extractor
          fi
