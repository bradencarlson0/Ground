name: Extract 7 Brew Yext dates

# PR run created to recover and freeze the official embedded dates without a local laptop.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/extract_yext_dates.py
      - scripts/archive_yext_pages.py
      - .github/workflows/extract-yext.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/extract_yext_dates.py
      - scripts/archive_yext_pages.py
      - .github/workflows/extract-yext.yml

permissions:
  contents: write

concurrency:
  group: extract-7brew-yext-dates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Crawl official Yext pages and decode embedded fields
        run: python scripts/extract_yext_dates.py
      - name: Freeze all 88 raw stand pages
        run: python scripts/archive_yext_pages.py outputs/7brew_al_fl_yext_dates.csv
      - name: Upload parsed evidence and raw snapshots
        uses: actions/upload-artifact@v4
        with:
          name: 7brew-yext-evidence-${{ github.run_id }}
          path: |
            outputs/
            raw_yext_pages/
          if-no-files-found: error
          retention-days: 30
      - name: Commit extracted dates
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No output changes"
          else
            git commit -m "Extract official 7 Brew Yext dates"
            git push
          fi
